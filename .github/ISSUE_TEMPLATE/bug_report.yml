name: Bug report
description: Report a bug with Auto-Forward Smart Speed.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        English first, French second. / Anglais en premier, français en second.
  - type: textarea
    id: description
    attributes:
      label: Bug description / Description du bug
      description: Explain what happened. / Expliquez ce qui s’est produit.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Étapes pour reproduire
      description: List the exact steps. / Listez les étapes exactes.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Comportement attendu
    validations:
      required: true
  - type: input
    id: dayz_version
    attributes:
      label: DayZ version / Version de DayZ
  - type: textarea
    id: mods
    attributes:
      label: Loaded mods / Mods chargés
      description: Include client and server mods if relevant. / Indiquez les mods client et serveur si utile.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / Logs ou captures
      description: Add relevant RPT lines or screenshots. / Ajoutez les lignes RPT ou captures utiles.
