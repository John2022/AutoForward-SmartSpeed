name: Feature request
description: Suggest an improvement or new behavior.
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: request
    attributes:
      label: Request / Demande
      description: Describe the requested change. / Décrivez le changement demandé.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case / Cas d’usage
      description: Explain why it would be useful in game. / Expliquez pourquoi ce serait utile en jeu.
    validations:
      required: true
  - type: textarea
    id: limits
    attributes:
      label: Compatibility or simplicity concerns / Compatibilité ou simplicité
      description: The mod is intended to stay focused and lightweight. / Le mod doit rester ciblé et léger.
