name: Server setup help
description: Ask for help with server/client loading, keybinds or signatures.
title: "[Server setup] "
labels: [support]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Problème
      description: Explain what does not work. / Expliquez ce qui ne fonctionne pas.
    validations:
      required: true
  - type: textarea
    id: launch
    attributes:
      label: Launch parameters / Paramètres de lancement
      description: Include client and server mod loading lines if relevant. / Indiquez les lignes de chargement client et serveur si utile.
  - type: textarea
    id: checks
    attributes:
      label: Checks already done / Vérifications déjà faites
      description: Mention if the game starts, keybind appears, signatures are valid, etc. / Indiquez si le jeu démarre, si la touche apparaît, si les signatures sont valides, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs / Journaux
      description: Add relevant RPT lines. / Ajoutez les lignes RPT utiles.
